[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# src/ como raiz de Python — los modulos se importan como auth.xxx, core.xxx
pythonpath = src
addopts =
    -v
    --tb=short
    --cov=auth
    --cov=core
    --cov-report=term-missing
    --cov-report=html:htmlcov
